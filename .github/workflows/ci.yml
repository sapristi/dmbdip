name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.8.2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y fonts-dejavu libfontconfig1-dev
      - name: Run tests
        run: cargo test
